<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.T. Jaynes Archive - Audit Workbench</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Papers</h2>
                <input type="text" id="paper-search" placeholder="Filter list...">
            </div>
            <ul id="paper-list">
                <!-- Papers will be injected here -->
            </ul>
        </aside>

        <div id="sidebar-toggle" title="Toggle Sidebar">
            &laquo;
        </div>
        
        <main id="content">
            <header id="top-header">
                <div class="nav-controls">
                    <button id="prev-btn" title="Previous Paper">&larr;</button>
                    <span id="current-filename">Select a paper</span>
                    <button id="next-btn" title="Next Paper">&rarr;</button>
                </div>
                <div class="find-in-paper">
                    <input type="text" id="find-input" placeholder="Find in paper (Enter to search)...">
                    <span id="find-counter"></span>
                </div>
                <div class="audit-controls">
                    <label>
                        <input type="checkbox" id="approved-chk"> Approved?
                    </label>
                </div>
            </header>
            
            <div id="viewer-container">
                <div id="hugo-pane" class="pane">
                    <iframe id="hugo-iframe" src="about:blank"></iframe>
                </div>
                <div id="pdf-pane" class="pane">
                    <div id="pdf-viewer-header">
                        <button id="zoom-out" title="Zoom Out">-</button>
                        <span id="zoom-level">100%</span>
                        <button id="zoom-in" title="Zoom In">+</button>
                        <button id="prev-page" title="Previous Page">&laquo;</button>
                        <span id="page-info">Page: <span id="page-num">1</span> / <span id="page-count">-</span></span>
                        <button id="next-page" title="Next Page">&raquo;</button>
                    </div>
                    <div id="pdf-canvas-container">
                        <!-- Multiple canvases will be injected here for continuous scroll -->
                    </div>
                    <div class="placeholder-text" id="pdf-placeholder" style="display:none;">
                        <h3>PDF Viewer</h3>
                        <p>Loading PDF...</p>
                    </div>
                </div>
            </div>
            
            <div id="capture-bar">
                <label for="fig-num">Figure #:</label>
                <input type="number" id="fig-num" min="1" max="20" value="1">
                <button id="capture-btn">Capture Selection</button>
            </div>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="static/js/workbench.js"></script>
</body>
</html>
